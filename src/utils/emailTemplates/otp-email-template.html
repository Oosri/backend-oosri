<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oosri OTP Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #fff; 
            border-radius: 15px;
            max-width: 350px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .card-header{
            background-color: #ff5c5c;
            width: 100%;
            height: fit-content;
            border-bottom-left-radius: 10%;
            border-bottom-right-radius: 10%;
        }
        .content{
            padding: 20px;
        }
        .container img {
            width: 100px;
            margin-bottom: 20px;
        }
        .card-header h1 {
            color: white;
            font-size: 24px;
            padding-bottom: 10px;
        }
        .content p {
            font-size: 14px;
        }
        .otp-container {
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: auto;
        }
        .otp-circle {
            width: 40px;
            height: 40px;
          background-color: #ffdbdb;
            border-radius: 50%;
            border: 1px solid #ff5c5c ;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            
            font-size: 20px;
            color: #ff5c5c;
            font-weight: bold; 
        }
        .otp-circle span{
            margin: auto  13px;
            justify-self: center;
            align-self: center;
      
        }
        .copy-btn {
            background-color: #ff5c5c;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px; 
        }
        .copy-btn:hover {
            background-color: #f0f0f0;
        }
        .footer {
            font-size: 12px;
            margin-top: 10px;
            line-height: 1.5; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-header">
             <img src="https://oosri.com/Buyer_Profile_images/1727247566123-oosri_logo.jpg" alt="Oosri Logo">
       <h1>Hi {{fullName}} !!</h1>
        </div>
        <div class="content">
            
            <p>You're almost there, only one step to join the Oosri family.</p>
            <p>Please use the OTP below to verify your account.</p>
            <p>The code is valid for 10 minutes.</p>
        </div>
       
        
        <div class="otp-container">
            <div class="otp-circle"><span>
                 {{otp1}}
            </span></div>
            <div class="otp-circle"> <span>
                {{otp2}}
            </span></div>
            <div class="otp-circle">
                <span>
                    {{otp3}}
                </span></div>
            <div class="otp-circle"> <span>
                {{otp4}}
            </span></div>
        </div>
    
        
        
        <p class="footer">Please ignore this mail if you did not initiate the request. Thank you</p>
    </div>

  

</body>
</html>
