<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Oosri OTP Verification</title>
    <style>



        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }
        .container {
            text-align: center;
            background-color: #fff; 
            border-radius: 15px;
            max-width: 500px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .card-header{
            background-color: #ff5c5c;
            width: 100%;
            height: 25vh;
            border-bottom-left-radius: 15%;
            border-bottom-right-radius: 15%;
            padding-top: 20px;
        }
        .content{
            padding: 20px;
        }
        
        .card-header h1 {
            color: white;
            font-size: 24px;
            padding-bottom: 10px;
        }
        .content p {
            font-size: 12px;
        }
        .otp-container {
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: auto;
        }
        .otp-circle {
            width: 40px;
            height: 40px;
          background-color: #ffdbdb;
            border-radius: 50%;
            border: 1px solid #ff5c5c ;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            
            font-size: 20px;
            color: #ff5c5c;
            font-weight: bold; 
        }
        .otp-circle span{
            margin: auto  13px;
            justify-self: center;
            align-self: center;
      
        }
        .img{
            background-color: #fff;
            width: 50%;
            margin:15px  auto;
            border-radius: 15px;
        }
        .copy-btn {
            background-color: #ff5c5c;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px; 
        }
        .copy-btn:hover {
            background-color: #f0f0f0;
        }
        .footer {
            font-size: 12px;
            margin: 10px auto;
            line-height: 1.5; 
            width: 220px;
            text-align: center;
                     padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-header">
            <div class="img">
                <img src="https://oosri.com/Buyer_Profile_images/1727284568910-osLogo.png" alt="Oosri Logo" width="100px">
            </div>
       <h1>Hi {{fullName}} !!</h1>
        </div>
        <div class="content">
            <p>You're almost there, only one step to join the Oosri family.</p>
            <p>Please use the OTP below to verify your account.</p>
            <p>The code is valid for 10 minutes.</p>
        </div>
       
        
        <div class="otp-container">
            <div class="otp-circle"><span>
                 {{otp1}}
            </span></div>
            <div class="otp-circle"> <span>
                {{otp2}}
            </span></div>
            <div class="otp-circle">
                <span>
                    {{otp3}}
                </span></div>
            <div class="otp-circle"> <span>
                {{otp4}}
            </span></div>
        </div>
    
        
        
        <p class="footer">Please ignore this mail if you did not initiate the request. Thank you</p>
    </div>

  

</body>
</html>
