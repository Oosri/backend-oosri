<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>Order Confirmed and Now Being Processed</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .container {
            background-color: #fff;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            height: auto;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: 20px;
            overflow: hidden;
        }

        .header {
            background-color: #ff5c5c;
            padding: 0 20px 20px 20px;
            text-align: center;
            width: 60%;
            margin: 0 auto;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;

        }

        .logo-container {
            background-color: #fff;
            display: inline-block;
            padding: 10px 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            max-width: 500px;
            width: 50%;
            height: 50px;
            vertical-align: middle;
        }

        .logo-container img {
            width: 100px;
            height: auto;
            height: 50px;
            vertical-align: middle;
        }

        .content {
            padding: 20px;
            text-align: left;
        }

        .content p {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
        }

        .view-order-btn {
            background-color: #ff5c5c;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 10px;
        }

        .footer {
            padding: 20px;
            background-color: white;
            text-align: center;
            font-size: 12px;
        }

        .footer p {
            margin: 0;
        }

        .social-icons {
            display: flex;
            gap: 50px;
            justify-content: center;
        }

        .social-icons a {
            width: 10px;
            margin: 0;
            display: flex;
            flex-direction: row;
        }

        .products img {
            width: 70px;
            margin: 15px 5px;
            border-radius: 10px;
        }
    </style>
</head>

    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="https://res.cloudinary.com/du18mzeaf/image/upload/v1767565622/a67764c983fd58fc6fff31c5d83dfd1a_qp4h42.png"
                    alt="Oosri Logo">
            </div>
        </div>
        <div class="content">
            <div class="content">
                <p>Hey <strong>{{fullName}}</strong>,</p>
                <p>We've got great news! Your order for <strong>[{{orderId}}]</strong> has been confirmed and is now
                    being processed.</p>
                <a href="#" class="view-order-btn">View Order</a>
                <p>We can't wait to get it out to you.</p>
                <p>You’ll get an email with tracking info as soon as it ships.</p>
                <p>Thanks for choosing Oosri!</p>
                <p>Best,</p>
                <p><strong>The Oosri Team</strong></p>
            </div>

        </div>
        <div class="products">
            <img src="{{ image1 }}" alt="Product Image 1">
            <img src="{{ image2 }}" alt="Product Image 2">
            <img src="{{ image3 }}" alt="Product Image 3">
        </div>
